<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Shellfire Preview</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  --mono: "SF Mono", ui-monospace, "Menlo", monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #000; font-family: var(--font); overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  height: 36px; background: #0f0f10; border-bottom: 1px solid #222224;
  display: flex; align-items: center; padding: 0 12px; gap: 10px;
  -webkit-app-region: drag; flex-shrink: 0;
}
#toolbar .t-logo { font-size: 12px; font-weight: 600; color: #f97316; -webkit-app-region: no-drag; }
#toolbar .t-info { font-size: 11.5px; color: #52525b; margin-left: 4px; }
#toolbar .t-badge {
  font-size: 10.5px; padding: 2px 8px; border-radius: 20px; margin-left: auto;
  font-weight: 500; -webkit-app-region: no-drag;
}
#toolbar .t-badge.live   { background: rgba(34,197,94,.12); color: #22c55e; border: 1px solid rgba(34,197,94,.25); }
#toolbar .t-badge.idle   { background: rgba(82,82,91,.12);  color: #52525b;  border: 1px solid rgba(82,82,91,.2); }
#toolbar .t-badge.error  { background: rgba(239,68,68,.12); color: #ef4444; border: 1px solid rgba(239,68,68,.25); }
#toolbar button { -webkit-app-region: no-drag; background: rgba(255,255,255,.06); border: 1px solid #2a2a2e; color: #a1a1aa; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; }
#toolbar button:hover { color: #fafafa; border-color: #3f3f46; }

/* ── Viewport ─────────────────────────────────────────────────── */
#viewport { flex: 1; position: relative; overflow: hidden; background: #060608; }
#sf-frame {
  position: absolute; transform-origin: top left;
  width: 1280px; height: 800px;
  background: #0f0f10; overflow: hidden;
  font-family: var(--font); font-size: 13px;
  display: flex; flex-direction: column;
}

/* Virtual Shellfire UI */
.sf-h { height: 46px; background: rgba(15,15,16,.97); border-bottom: 1px solid #222226; display: flex; align-items: center; padding: 0 18px; gap: 12px; flex-shrink: 0; }
.sf-logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #fafafa; }
.sf-logo .fire { color: #f97316; }
.sf-logo svg { width: 20px; height: 20px; }
.sf-tb { display: flex; align-items: center; gap: 3px; }
.sf-btn { width: 30px; height: 30px; border-radius: 6px; border: none; background: transparent; color: #71717a; font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .12s, color .12s; font-family: var(--font); }
.sf-btn:hover { background: #1e1e22; color: #a1a1aa; }
.sf-sep { width: 1px; height: 20px; background: #27272a; margin: 0 4px; }
#sf-tb-ext { display: flex; align-items: center; gap: 3px; }
.sf-body { flex: 1; display: flex; overflow: hidden; }
.sf-sb { width: 210px; background: #101012; border-right: 1px solid #222224; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sf-sb-hdr { padding: 12px 14px 6px; font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: #3f3f46; }
.sf-pane-item { padding: 6px 16px; font-size: 12.5px; color: #71717a; border-left: 2px solid transparent; display: flex; align-items: center; gap: 9px; cursor: pointer; transition: background .1s, color .1s; }
.sf-pane-item:hover { background: #1a1a1e; color: #a1a1aa; }
.sf-pane-item.active { color: #fafafa; border-left-color: #f97316; background: rgba(249,115,22,.07); }
.sf-pane-item .pdot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.sf-pane-item .pdot.off { background: #3f3f46; }
#sf-panel-list { flex: 1; overflow-y: auto; }
.sf-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.sf-content { flex: 1; display: flex; overflow: hidden; position: relative; }
.sf-term { flex: 1; background: #09090b; padding: 16px 18px; font-family: var(--mono); font-size: 12.5px; line-height: 1.65; overflow-y: auto; color: #a1a1aa; }
.sf-term .prompt { color: #3f3f46; }
.sf-term .cmd    { color: #fafafa; }
.sf-term .out    { color: #71717a; }
.sf-term .url    { color: #3b82f6; }
.sf-term .cursor { display: inline-block; width: 7px; height: 13px; background: #f97316; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
@keyframes blink { 50% { opacity: 0; } }
.sf-sb-right { position: absolute; right: 0; top: 0; bottom: 0; width: 260px; background: #101012; border-left: 1px solid #222224; display: none; flex-direction: column; }
.sf-sb-right.show { display: flex; }
.sf-sb-right-hdr { padding: 12px 14px 10px; font-size: 12px; font-weight: 600; color: #a1a1aa; border-bottom: 1px solid #222224; display: flex; align-items: center; justify-content: space-between; }
.sf-sb-right-close { background: none; border: none; color: #52525b; font-size: 16px; cursor: pointer; padding: 0 2px; }
.sf-sb-right-close:hover { color: #a1a1aa; }
.sf-sb-right-body { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 12px; color: #71717a; }
.sf-statusbar { height: 27px; background: #0c0c0e; border-top: 1px solid #222224; display: flex; align-items: center; padding: 0 14px; gap: 14px; flex-shrink: 0; }
.sf-s-item { font-size: 11px; color: #3f3f46; display: flex; align-items: center; gap: 5px; cursor: default; }
.sf-s-item .sdot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }
#sf-status-ext { display: flex; align-items: center; gap: 12px; margin-left: auto; }
/* Context menu */
.sf-ctx-menu { position: absolute; background: #18181b; border: 1px solid #3f3f46; border-radius: 7px; min-width: 160px; padding: 4px; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.6); display: none; }
.sf-ctx-menu.show { display: block; }
.sf-ctx-item { padding: 6px 10px; font-size: 12.5px; color: #a1a1aa; border-radius: 5px; cursor: pointer; }
.sf-ctx-item:hover { background: rgba(249,115,22,.1); color: #f97316; }
/* Notification toast */
.sf-toast { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #18181b; border: 1px solid #3f3f46; color: #a1a1aa; font-size: 12px; padding: 7px 16px; border-radius: 20px; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
.sf-toast.show { opacity: 1; }

#wrap { display: flex; flex-direction: column; height: 100vh; }
</style>
</head>
<body>
<div id="wrap">
<div id="toolbar">
  <span class="t-logo">🔥 Shellfire</span>
  <span class="t-info">Live Preview</span>
  <span id="t-badge" class="t-badge idle">Waiting for code…</span>
  <button onclick="Preview.reset()">↺ Reset</button>
  <button onclick="Preview.togglePanel()">⊞ Panel</button>
</div>
<div id="viewport">
<div id="sf-frame">
  <!-- Header -->
  <div class="sf-h">
    <div class="sf-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C7.5 7 6 10.5 9 14c-1.5-.8-2.5-2.5-2.5-4C4.5 14.5 7 19 12 22c5-3 7.5-7.5 5.5-12.5-.8 1.5-2.5 3-4 3 3-3 2.5-7-1.5-10.5z" fill="#f97316"/></svg>
      Shell<span class="fire">fire</span>
    </div>
    <div class="sf-tb">
      <button class="sf-btn" title="Split pane">⊞</button>
      <button class="sf-btn" title="Zoom">⤢</button>
      <div class="sf-sep"></div>
      <div id="sf-tb-ext"></div>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <button class="sf-btn" title="Broadcast">📡</button>
      <button class="sf-btn" title="Settings">⚙</button>
    </div>
  </div>

  <!-- Body -->
  <div class="sf-body">
    <!-- Left sidebar -->
    <div class="sf-sb">
      <div class="sf-sb-hdr">Sessions</div>
      <div class="sf-pane-item active"><span class="pdot"></span>Terminal 1 <span style="margin-left:auto;font-size:10.5px;color:#3f3f46">zsh</span></div>
      <div class="sf-pane-item"><span class="pdot"></span>api-server <span style="margin-left:auto;font-size:10.5px;color:#3f3f46">node</span></div>
      <div class="sf-pane-item"><span class="pdot off"></span>git-watcher <span style="margin-left:auto;font-size:10.5px;color:#3f3f46">idle</span></div>
      <div id="sf-panel-list"></div>
    </div>

    <!-- Main area -->
    <div class="sf-main">
      <div class="sf-content" id="sf-content"
        oncontextmenu="Preview.showCtx(event)">
        <!-- Terminal -->
        <div class="sf-term" id="sf-term">
          <div><span class="prompt">~/projects/my-app</span> <span style="color:#3f3f46">on</span> <span style="color:#3b82f6"> main</span></div>
          <div><span class="prompt">❯</span> <span class="cmd">npm run dev</span></div>
          <div class="out">  vite v5.4.0 dev server running</div>
          <div class="out">  ➜ Local:   <span class="url">http://localhost:5173/</span></div>
          <div class="out">  ➜ Network: <span class="url">http://192.168.1.5:5173/</span></div>
          <div style="margin-top:6px"><span class="prompt">❯</span> <span class="cursor"></span></div>
        </div>
        <!-- Extension right panel -->
        <div class="sf-sb-right" id="sf-right-panel">
          <div class="sf-sb-right-hdr">
            <span id="sf-right-title">Panel</span>
            <button class="sf-sb-right-close" onclick="Preview.hidePanel()">✕</button>
          </div>
          <div class="sf-sb-right-body" id="sf-right-body"></div>
        </div>
      </div>

      <!-- Status bar -->
      <div class="sf-statusbar">
        <div class="sf-s-item"><span class="sdot"></span>3 panes</div>
        <div class="sf-s-item"> main</div>
        <div class="sf-s-item">node 22</div>
        <div id="sf-status-ext"></div>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div class="sf-ctx-menu" id="sf-ctx"></div>
  <!-- Toast -->
  <div class="sf-toast" id="sf-toast"></div>
</div>
</div>
</div>

<script>
"use strict";

// ── Scale preview to fit viewport ─────────────────────────────
function scaleFrame() {
  const vp = document.getElementById("viewport");
  const fr = document.getElementById("sf-frame");
  const vw = vp.clientWidth, vh = vp.clientHeight;
  const scale = Math.min(vw / 1280, vh / 800);
  fr.style.transform = `scale(${scale})`;
  fr.style.left = ((vw - 1280 * scale) / 2) + "px";
  fr.style.top  = ((vh - 800  * scale) / 2) + "px";
}
window.addEventListener("resize", scaleFrame);
scaleFrame();

// ── Mock API (same as studio but full-size) ───────────────────
let currentDispose = null;
const E = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

const Preview = {
  reset() {
    if (currentDispose) { try { currentDispose(); } catch {} currentDispose = null; }
    document.getElementById("sf-tb-ext").innerHTML = "";
    document.getElementById("sf-status-ext").innerHTML = "";
    document.getElementById("sf-panel-list").innerHTML = "";
    document.getElementById("sf-right-panel").classList.remove("show");
    document.getElementById("sf-right-body").innerHTML = "";
    document.getElementById("sf-term").style.background = "#09090b";
    document.getElementById("sf-term").style.color = "#a1a1aa";
    document.getElementById("sf-frame").querySelector(".sf-h").style.background = "";
    document.getElementById("sf-frame").querySelector(".sf-sb").style.background = "";
    document.getElementById("sf-frame").querySelector(".sf-statusbar").style.background = "";
    hideCtx();
  },
  togglePanel() {
    document.getElementById("sf-right-panel").classList.toggle("show");
  },
  hidePanel() {
    document.getElementById("sf-right-panel").classList.remove("show");
  },
  showCtx(e) {
    e.preventDefault();
    const ctx = document.getElementById("sf-ctx");
    if (!ctx.children.length) return;
    ctx.style.left = e.offsetX + "px";
    ctx.style.top  = e.offsetY + "px";
    ctx.classList.add("show");
  },
  toast(msg, dur=2500) {
    const t = document.getElementById("sf-toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), dur);
  },
};

function hideCtx() {
  document.getElementById("sf-ctx").classList.remove("show");
  document.getElementById("sf-ctx").innerHTML = "";
}
document.addEventListener("click", hideCtx);

function appendTermLine(html) {
  const term = document.getElementById("sf-term");
  const cursor = term.querySelector(".cursor");
  const div = document.createElement("div");
  div.innerHTML = html;
  if (cursor) cursor.parentElement.insertBefore(div, cursor.parentElement.lastChild);
  else term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function buildAPI() {
  const disposed = [];
  const api = {
    terminal: {
      getActive: () => 1,
      getAll: () => [
        { id:1, name:"Terminal 1", cwd:"~/projects/my-app" },
        { id:2, name:"api-server", cwd:"~/projects/my-app" },
        { id:3, name:"git-watcher", cwd:"~" },
      ],
      send(text) {
        appendTermLine(`<span class="prompt">❯</span> <span class="cmd">${E(text.replace(/\n$/,""))}</span>`);
        Preview.toast(`→ ${text.trim().slice(0,40)}`);
      },
      getOutput: () => "❯ npm run dev\n  vite v5.4.0 running\n",
      onOutput(cb) { const t=setInterval(()=>{},999999); disposed.push(()=>clearInterval(t)); return { dispose:()=>clearInterval(t) }; },
      onInput: () => ({ dispose:()=>{} }),
      create: async (cwd) => { appendTermLine(`<span style="color:#22c55e">✓ New pane created${cwd?" in "+E(cwd):""}</span>`); return 4; },
      focus: (id) => { Preview.toast(`Focused pane ${id}`); },
    },
    ui: {
      toolbar: {
        add(cfg) {
          const btn = document.createElement("button");
          btn.className = "sf-btn"; btn.title = cfg.tooltip || cfg.id || "";
          btn.innerHTML = typeof cfg.icon==="string"&&cfg.icon.length<=4
            ? cfg.icon : (cfg.label ? E(cfg.label) : "⚡");
          if (cfg.label && cfg.icon) btn.innerHTML = `${cfg.icon} <span style="font-size:10px">${E(cfg.label)}</span>`;
          btn.onclick = () => { try { cfg.onClick?.(); } catch(e) { Preview.toast("Error: "+e.message,3000); } };
          document.getElementById("sf-tb-ext").appendChild(btn);
          disposed.push(() => btn.remove());
          return { remove:()=>btn.remove() };
        },
      },
      panel: {
        add(cfg) {
          // Sidebar entry
          const li = document.createElement("div");
          li.className = "sf-pane-item";
          li.innerHTML = `<span style="font-size:11px">${cfg.icon||"📋"}</span> ${E(cfg.title||cfg.id)}`;
          li.onclick = () => { Preview.showPanelContent(cfg); };
          document.getElementById("sf-panel-list").appendChild(li);
          // Show panel immediately
          Preview.showPanelContent(cfg);
          disposed.push(() => { li.remove(); Preview.hidePanel(); });
          const obj = {
            refresh() { Preview.showPanelContent(cfg); },
            remove() { li.remove(); Preview.hidePanel(); },
          };
          return obj;
        },
      },
      menu: {
        add(cfg) {
          const item = document.createElement("div");
          item.className = "sf-ctx-item";
          item.textContent = cfg.label;
          item.onclick = () => { try { cfg.onClick?.({paneId:1,selection:"selected text",x:0,y:0}); } catch {} hideCtx(); };
          document.getElementById("sf-ctx").appendChild(item);
          disposed.push(() => item.remove());
          return { remove:()=>item.remove() };
        },
      },
      statusbar: {
        add(cfg) {
          const span = document.createElement("div");
          span.className = "sf-s-item";
          span.innerHTML = E(cfg.text||"");
          span.title = cfg.tooltip||"";
          span.style.cursor = cfg.onClick?"pointer":"default";
          if (cfg.onClick) span.onclick = () => { try { cfg.onClick(); } catch {} };
          document.getElementById("sf-status-ext").appendChild(span);
          disposed.push(() => span.remove());
          return {
            setText(t) { span.innerHTML = E(t); },
            setTooltip(t) { span.title = t; },
            remove() { span.remove(); },
          };
        },
      },
    },
    commands: {
      register(cfg) {
        Preview.toast(`Command: "${cfg.name}"${cfg.keybinding?" ["+cfg.keybinding+"]":""}`);
        return { remove:()=>{} };
      },
    },
    storage: {
      _d:{}, get:async k=>api.storage._d[k],
      set:async(k,v)=>{api.storage._d[k]=v;},
      delete:async k=>{delete api.storage._d[k];},
      clear:async()=>{api.storage._d={};},
    },
    ai: {
      complete: async (p) => "(AI — connect to Shellfire for live calls)",
      chat: async (m) => "(AI — connect to Shellfire for live calls)",
    },
    events: {
      _h:{},
      emit(e,d){(api.events._h[e]||[]).forEach(f=>f(d));},
      on(e,f){(api.events._h[e]=api.events._h[e]||[]).push(f);return{dispose:()=>{api.events._h[e]=(api.events._h[e]||[]).filter(g=>g!==f);}};},
    },
    settings: {},
  };
  return { api, disposed };
}

Preview.showPanelContent = (cfg) => {
  document.getElementById("sf-right-title").textContent = cfg.title || cfg.id;
  const body = document.getElementById("sf-right-body");
  body.innerHTML = "";
  const c = document.createElement("div");
  try { cfg.render?.(c); } catch(e) { c.style.color="#ef4444"; c.textContent=e.message; }
  body.appendChild(c);
  document.getElementById("sf-right-panel").classList.add("show");
};

function runCode(code, manifest) {
  Preview.reset();
  if (!code?.trim()) return;
  setBadge("idle", "Evaluating…");

  let exports = {};
  try {
    const fn = new Function("exports","module", code);
    const mod = { exports:{} };
    fn(mod.exports, mod);
    exports = mod.exports;
  } catch(e) {
    setBadge("error", "Syntax error: " + e.message.slice(0,40));
    return;
  }

  // Theme
  if (exports.colors) {
    const c = exports.colors;
    document.getElementById("sf-term").style.background = c.background || "#09090b";
    document.getElementById("sf-term").style.color = c.foreground || "#a1a1aa";
    if (c.uiBackground) {
      document.getElementById("sf-frame").querySelector(".sf-h").style.background = c.uiBackground;
      document.getElementById("sf-frame").querySelector(".sf-sb").style.background = c.uiBackground;
      document.getElementById("sf-frame").querySelector(".sf-statusbar").style.background = c.uiBackground;
    }
    setBadge("live", "Theme applied");
    return;
  }

  if (typeof exports.activate === "function") {
    const { api, disposed } = buildAPI();
    currentDispose = () => {
      disposed.forEach(f=>{ try{f();}catch{} });
      try { exports.deactivate?.(); } catch {}
    };
    try {
      exports.activate(api);
      setBadge("live", "Extension live");
    } catch(e) {
      setBadge("error", "activate() error: " + e.message.slice(0,40));
    }
    return;
  }

  if (exports.name && exports.execute) {
    setBadge("live", `Command: "${exports.name}"`);
    return;
  }
  setBadge("idle", "No activate() or colors found");
}

function setBadge(type, msg) {
  const b = document.getElementById("t-badge");
  b.className = "t-badge " + type;
  b.textContent = msg;
}

// ── Receive code from studio ──────────────────────────────────
if (window.previewBridge) {
  window.previewBridge.onCode((code, manifest) => runCode(code, manifest));
  window.previewBridge.onReset(() => { Preview.reset(); setBadge("idle","Waiting for code…"); });
}
</script>
</body>
</html>
